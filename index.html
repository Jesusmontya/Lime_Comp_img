        }

        .bg-blob {
            position: absolute;
            filter: blur(100px);

            border-radius: 50%;

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }

        /* BLOQUEO DE SCROLL FANTASMA EN EL SLIDER PARA MÓVILES */
        input[type=range] {
            touch-action: none;
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {

            width: 40px;
            height: 40px;

                                    <path d="M50 15 L80 35 L80 65 L50 85 L20 65 L20 35 Z" fill="url(#robotBody)" stroke="#c7d2fe" stroke-width="2.5" stroke-linejoin="round"/>
                                    
                                    <path d="M22 45 Q50 36 78 45 L72 58 Q50 65 28 58 Z" fill="url(#visorDark)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
                                    
                                    <g class="transition-all duration-300">
                                        <circle cx="38" cy="50" r="7" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
                                        <circle cx="38" cy="50" r="4" class="limes-eye animate-pulse transition-colors duration-300" fill="#4fd1c5"/>
                                        <circle cx="36.5" cy="48.5" r="1.5" fill="white"/>

                                    <g class="transition-all duration-300">
                                        <circle cx="62" cy="50" r="7" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
                                        <circle cx="62" cy="50" r="4" class="limes-eye animate-pulse transition-colors duration-300" fill="#4fd1c5"/>
                                        <circle cx="60.5" cy="48.5" r="1.5" fill="white"/>

                                    <path d="M46 68 Q50 73 54 68" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                            
                                    <ellipse cx="50" cy="80" rx="14" ry="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>

                        <ins class="adsbygoogle"
                             style="display:block; width:100%; height:100%;"

                    <div class="glass rounded-3xl p-6 sm:p-12 flex flex-col items-center justify-center text-center border-dashed border-2 border-indigo-900/30 glow-hover relative group cursor-pointer transition-colors min-h-[250px] md:min-h-[300px]" id="dropzone">
                        <div class="mb-4 text-indigo-400 group-hover:text-indigo-300 transition-colors transform group-hover:scale-110 duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14 md:h-16 md:w-16 mx-auto drop-shadow-[0_0_15px_rgba(99,102,241,0.5)]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                            </svg>

                        <h3 class="text-xl md:text-2xl font-bold text-white mb-2 tracking-tight">Arrastra tus imágenes aquí</h3>
                        <p class="text-gray-400 text-xs md:text-sm mb-6 font-medium">Soporta múltiples JPG, PNG y WebP</p>
                        
                        <button id="btn-explorar" class="bg-white/10 hover:bg-white/20 border border-white/10 text-white px-6 py-2.5 md:px-8 md:py-3 rounded-full text-sm md:text-base font-semibold transition-all shadow-[0_0_20px_rgba(255,255,255,0.05)] backdrop-blur-sm z-10 relative">

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        let btnExplorar = document.getElementById('btn-explorar');
        const contadorImagenes = document.getElementById('contador-imagenes');
        const resultsContainer = document.getElementById('results-container');
        
        const limesSvg = document.getElementById('limes-svg');
        const limesEyes = document.querySelectorAll('.limes-eye');
        const limesSpeech = document.getElementById('limes-speech');

        let imagenesOptimizadas = 0; 
        let archivosProcesandose = 0;

        function setRobotState(state) {
            if (state === 'working') {
                limesSvg.classList.replace('drop-shadow-[0_0_15px_rgba(99,102,241,0.6)]', 'drop-shadow-[0_0_30px_rgba(239,68,68,0.8)]');
                limesEyes.forEach(e => e.setAttribute('fill', '#ef4444')); 
                limesSpeech.innerText = "¡Procesando! 🔴";
                limesSpeech.className = "absolute top-3 right-3 md:top-5 md:right-5 bg-red-600 text-white text-[10px] md:text-xs font-bold px-2 py-1 md:px-3 md:py-1.5 rounded-full rounded-bl-none animate-fade-in z-10";
            } else if (state === 'done') {
                limesSvg.classList.replace('drop-shadow-[0_0_30px_rgba(239,68,68,0.8)]', 'drop-shadow-[0_0_20px_rgba(34,197,94,0.6)]');
                limesEyes.forEach(e => e.setAttribute('fill', '#22c55e')); 
                limesSpeech.innerText = "¡Quedó divina! 🟢";
                limesSpeech.className = "absolute top-3 right-3 md:top-5 md:right-5 bg-green-600 text-white text-[10px] md:text-xs font-bold px-2 py-1 md:px-3 md:py-1.5 rounded-full rounded-bl-none animate-fade-in z-10";
            } else {
                limesSvg.className = "w-full h-full drop-shadow-[0_0_15px_rgba(99,102,241,0.6)] transition-all duration-500";
                limesEyes.forEach(e => e.setAttribute('fill', '#4fd1c5')); 
                limesSpeech.innerText = "¡Yo me encargo! 🤖";
                limesSpeech.className = "absolute top-3 right-3 md:top-5 md:right-5 bg-indigo-600 text-white text-[10px] md:text-xs font-medium px-2 py-1 md:px-3 md:py-1.5 rounded-full rounded-bl-none animate-fade-in z-10";
            }
        }

        // Eventos Dropzone
        dropzone.onclick = (e) => {
            if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A' && e.target.tagName !== 'INPUT') fileInput.click();
        };
        btnExplorar.onclick = (e) => {
            e.stopPropagation(); 
            fileInput.click();
        };

        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('border-indigo-500', 'bg-indigo-500/10'); });
        dropzone.addEventListener('dragleave', () => { dropzone.classList.remove('border-indigo-500', 'bg-indigo-500/10'); });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('border-indigo-500', 'bg-indigo-500/10');
            if (e.dataTransfer.files.length) procesarMultiplesArchivos(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) procesarMultiplesArchivos(e.target.files);
            fileInput.value = ''; 
        });

        // Lógica de Lote (Batch Processing)
        function procesarMultiplesArchivos(files) {
            archivosProcesandose += files.length;
            setRobotState('working');

            for (let i = 0; i < files.length; i++) {
                comprimirUnSoloArchivo(files[i]);
            }
        }

        async function comprimirUnSoloArchivo(file) {
            const uniqueId = Math.random().toString(36).substr(2, 9);
            
            // 1. Crear Tarjeta de "Cargando"
            const card = document.createElement('div');
            card.id = `card-${uniqueId}`;
            card.className = "glass rounded-3xl p-6 flex flex-col items-center justify-center animate-pulse min-h-[200px]";
            card.innerHTML = `
                <svg class="animate-spin h-10 w-10 text-red-500 mb-4" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-gray-400 text-sm font-medium">Triturando <span class="text-white">${file.name}</span>...</p>
            `;
            // Insertar al inicio de la lista
            resultsContainer.prepend(card);

            const formData = new FormData();
            formData.append("file", file);

            try {
                const originalUrl = URL.createObjectURL(file);
                const sizeOriginal = (file.size / 1024).toFixed(1);

                const [response] = await Promise.all([
                 fetch("https://devgroupstudio.xyz/api/compress", { method: "POST", body: formData }),
                    new Promise(r => setTimeout(r, 1000))
                ]);

                if (!response.ok) throw new Error();

                const blob = await response.blob();
                const compressedUrl = URL.createObjectURL(blob);
                const sizeNuevo = (blob.size / 1024).toFixed(1);
                let porcentaje = Math.round((1 - (blob.size / file.size)) * 100);
                if (porcentaje < 0) porcentaje = 0; 

                // 2. Reemplazar "Cargando" con el Resultado Real
                card.className = "glass rounded-3xl p-6 flex flex-col items-center w-full animate-fade-in z-10 relative group";
                card.innerHTML = `
                    <button onclick="document.getElementById('card-${uniqueId}').remove()" class="absolute top-4 right-4 bg-white/5 hover:bg-red-500/20 text-gray-400 hover:text-red-400 p-2 rounded-full transition-colors z-30">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>

                    <h4 class="text-white font-bold text-sm md:text-base mb-4 w-full text-left truncate pr-10">${file.name}</h4>

                    <div class="relative w-full h-56 md:h-72 rounded-xl overflow-hidden mb-6 bg-black/40 border border-white/5 cursor-ew-resize">
                        <img src="${originalUrl}" class="absolute inset-0 w-full h-full object-contain">
                        <img id="img-compressed-${uniqueId}" src="${compressedUrl}" class="absolute inset-0 w-full h-full object-contain" style="clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%);">
                        <input type="range" id="compare-slider-${uniqueId}" min="0" max="100" value="50" class="absolute inset-0 w-full h-full opacity-0 z-20 cursor-ew-resize">
                        <div id="slider-line-${uniqueId}" class="absolute top-0 bottom-0 left-[50%] w-[2px] bg-white shadow-lg transform -translate-x-1/2 pointer-events-none z-10">
                            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-6 h-6 bg-white rounded-full flex items-center justify-center shadow-xl">
                                <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M8 9l4-4 4 4m0 6l-4 4-4-4"></path></svg>
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-4 md:gap-6 items-center mb-6 w-full justify-center">
                        <div class="text-right text-[10px] md:text-xs text-gray-400">Original: <br class="block md:hidden"><span class="font-bold text-gray-200">${sizeOriginal} KB</span></div>
                        <div class="bg-green-500/20 text-green-400 px-2 py-1 md:px-3 md:py-1 rounded-full text-xs md:text-sm font-bold border border-green-500/30">-${porcentaje}%</div>
                        <div class="text-left text-[10px] md:text-xs text-gray-400">LessImage: <br class="block md:hidden"><span class="font-bold text-indigo-400">${sizeNuevo} KB</span></div>
                    </div>

                    <a href="${compressedUrl}" download="lessimage_${file.name.split('.')[0]}.webp" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:scale-[1.02] text-white py-3 md:py-4 rounded-xl font-bold text-sm md:text-base transition-all flex items-center justify-center gap-2">
                        <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Descargar Optimización
                    </a>
                `;

                // Activar Lógica del Slider específicamente para esta tarjeta
                const slider = document.getElementById(`compare-slider-${uniqueId}`);
                const imgCompressed = document.getElementById(`img-compressed-${uniqueId}`);
                const sliderLine = document.getElementById(`slider-line-${uniqueId}`);
                
                slider.oninput = (e) => {
                    imgCompressed.style.clipPath = `polygon(0 0, ${e.target.value}% 0, ${e.target.value}% 100%, 0 100%)`;
                    sliderLine.style.left = `${e.target.value}%`;
                };

                imagenesOptimizadas++;
                contadorImagenes.innerText = imagenesOptimizadas;

            } catch (error) {
                card.innerHTML = `
                    <div class="text-center">
                        <svg class="w-12 h-12 text-red-500 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p class="text-red-400 font-bold">Error de conexión con ${file.name}</p>
                        <button onclick="document.getElementById('card-${uniqueId}').remove()" class="mt-4 text-xs text-gray-500 hover:text-white underline">Cerrar mensaje</button>
                    </div>
                `;
            } finally {
                archivosProcesandose--;
                if(archivosProcesandose === 0) {
                    setRobotState('done');
                    // Volver a estado normal después de 3 segundos
                    setTimeout(() => { if(archivosProcesandose === 0) setRobotState('idle'); }, 3000);
                }
            }
        }
    </script>
